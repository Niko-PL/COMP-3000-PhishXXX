<!DOCTYPE html>
<html>
  <head>
    <title>Gmail Logger Mk3</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="in-line">
      <img id="logo" src="images/Hussar_Mk2.png" alt="Hussar MK2 Logo">
      <h3>Gmail Logger Mk3</h3>
      <button type="button" class="settings-button" id="settings_button" aria-expanded="false">&#9881;</button>
      <button type="button" class="settings-button" id="security_button" aria-expanded="false">&#128737;</button>
    </div>

    

    <div id="security_section" class="security-section-hidden" aria-hidden="true">
      <h5>Security Settings</h5>
      <div class="settings-container">
        <label>Highlight on Open</label>
        <div class="switch-row">
          <h4 class="switch_text_left">NO</h4>
          <label class="switch">
            <input type="checkbox" id="highlight_on_open">
            <span class="slider round"></span>
          </label>
          <h4 class="switch_text_right">YES</h4>
        </div>
      </div>

      <div class="settings-container">
        <label>Use Hussar API</label>
        <div class="switch-row">
          <h4 class="switch_text_left">NO</h4>
          <label class="switch">
            <input type="checkbox" id="use_hussar_api">
            <span class="slider round"></span>
          </label>
          <h4 class="switch_text_right">YES</h4>
        </div>
      </div>



      <div class="settings-container">
        <label>WHOIS API</label>
        <div class="switch-row">
          <h4 class="switch_text_left">NO</h4>
          <label class="switch">
            <input type="checkbox" id="use_whois_api">
            <span class="slider round"></span>
          </label>
          <h4 class="switch_text_right">YES</h4>
        </div>
      </div>


      <div class="settings-container">
        <label>VirusTotal API</label>
        <div class="switch-row">
          <h4 class="switch_text_left">NO</h4>
          <label class="switch">
            <input type="checkbox" id="use_virustotal_api">
            <span class="slider round"></span>
          </label>
          <h4 class="switch_text_right">YES</h4>
        </div>
      </div>


      <div class="settings-container">
        <label>Use Language Processing for Highlighting</label>
        <div class="switch-row">
          <h4 class="switch_text_left">NO</h4>
          <label class="switch">
            <input type="checkbox" id="use_ai">
            <span class="slider round"></span>
            </label>
            <h4 class="switch_text_right">YES</h4>
        </div>
      </div>
      
    </div>
    
    
    <div id= settings_section class="settings-section-hidden" aria-hidden="true" >
      <h5>Keep empty for defaults</h5>

      <label> WHOIS API User:</label>
      
      <div style="display: flex; align-items: center; gap: 4px;">
        <input type="text" id="WHOIS_USER" placeholder="Enter WHOIS API User" title="WHOIS API User Paste Here"/>
        <button type="button" id="WHOIS_USER_Looker" title="View API User">&#x1F441;</button>
      </div>

      <button type="button" id="WHOIS_USER_button" aria-expanded="false">Set API User</button>
      
      

      <label> WHOIS JSON API Key:</label>
      
      <div style="display: flex; align-items: center; gap: 4px;">
        <input type="text" id="WHOISJSON_API_KEY" placeholder="Enter WHOIS JSON API Key" title="WHOIS JSON API Key Paste Here"/>
        <button type="button" id="WHOISJSON_API_KEY_Looker" title="View API Key">&#x1F441;</button>
      </div>

      <button type="button" id="WHOISJSON_API_KEY_button" aria-expanded="false">Set API Key</button>

      <label> Virus Total API Key:</label>
      <div style="display: flex; align-items: center; gap: 4px;">
        <input type="text" id="Virus_Total_API_KEY" placeholder="Enter Virus Total API Key" title="Virus Total API Key Paste Here"/>
        <button type="button" id="Virus_Total_API_KEY_Looker" title="View API Key">&#x1F441;</button>
      </div>
      
      <button type="button" id="Virus_Total_API_KEY_button" aria-expanded="false">Set API Key</button>
      
      
    </div>

    <div class="status-container">
      <div class="status-container-item">
        <span>Hussar Status</span>
        <span id="Hussar_API_Status" class="status"> Offline</span>
      </div>
      <div class="status-container-item"> 
        <span>WHOIS Status</span>
        <span id="WHOIS_API_Status" class="status"> Offline</span>
      </div>
      <div class="status-container-item"> 
        <span>VirusTotal Status</span>
        <span id="Virus_Total_API_Status" class="status"> Offline</span>
      </div>
    </div>


    <button id="run_highlighter">Highlight Words</button>
    
    <p id="status"></p>
    <script src="SECRETS.js"></script>
    <script src="check_url.js"></script>
    <script src="HTML_Controler.js"></script>


  </body>
</html>
